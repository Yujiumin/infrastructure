services:
  nginx:
    image: nginx:1.30.0-alpine
    container_name: nginx-proxy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # 主配置文件
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # 站点配置目录
      - ./conf.d:/etc/nginx/conf.d:ro
      # 默认站点配置目录
      - ./default.d:/etc/nginx/default.d:ro
      # 网站文件目录
      - ./html:/var/www/html:ro
      # 日志目录（持久化）
      - ./logs:/var/log/nginx
    networks:
      - webnet
    restart: unless-stopped

networks:
  webnet:
    driver: bridge
