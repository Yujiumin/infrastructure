<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>502 - 网关错误</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', sans-serif;
        background: #fafbfc;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .container {
        max-width: 500px;
        width: 100%;
        text-align: center;
        background: white;
        border-radius: 24px;
        padding: 3rem 2rem;
        box-shadow:
          0 10px 25px -5px rgba(0, 0, 0, 0.05),
          0 8px 10px -6px rgba(0, 0, 0, 0.02);
        border: 1px solid #eef2f6;
      }

      .code {
        font-size: 5rem;
        font-weight: 700;
        color: #8b5cf6;
        letter-spacing: 0.05em;
        margin-bottom: 1rem;
        line-height: 1;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 0.75rem;
      }

      .message {
        font-size: 0.95rem;
        color: #64748b;
        line-height: 1.5;
        margin-bottom: 2rem;
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #2563eb;
        color: white;
        text-decoration: none;
        padding: 0.7rem 1.5rem;
        border-radius: 40px;
        font-weight: 500;
        font-size: 0.9rem;
        transition:
          background 0.2s,
          transform 0.1s;
        border: none;
        cursor: pointer;
      }

      .home-link:hover {
        background: #1d4ed8;
      }

      .home-link:active {
        transform: scale(0.97);
      }

      .divider {
        width: 48px;
        height: 2px;
        background: #e2e8f0;
        margin: 1rem auto 1.5rem;
        border-radius: 2px;
      }

      .hint {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 2rem;
        border-top: 1px solid #f1f5f9;
        padding-top: 1rem;
      }

      .retry-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: transparent;
        color: #64748b;
        text-decoration: none;
        font-size: 0.85rem;
        margin-top: 0.75rem;
        padding: 0.4rem 1rem;
        border-radius: 40px;
        transition: background 0.2s;
      }

      .retry-link:hover {
        background: #f1f5f9;
        color: #1e293b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">502</div>
      <h1>网关错误</h1>
      <div class="divider"></div>
      <div class="message">
        服务器作为网关或代理时收到无效响应。<br />
        请稍后重试，或联系管理员。
      </div>
      <a href="/" class="home-link" id="homeLink"> <span>←</span> 返回首页 </a>
      <br />
      <a href="#" class="retry-link" id="retryLink"> ⟳ 尝试重新加载 </a>
      <div class="hint">若问题持续存在，请联系技术支持</div>
    </div>

    <script>
      // 首页跳转
      const homeLink = document.getElementById('homeLink');
      if (homeLink) {
        homeLink.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.href = '/';
        });
      }

      // 重试按钮：刷新当前页面
      const retryLink = document.getElementById('retryLink');
      if (retryLink) {
        retryLink.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.reload();
        });
      }

      console.log('502: 网关或代理服务器收到无效响应');
    </script>
  </body>
</html>
