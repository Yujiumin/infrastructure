<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 资源未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #fafbfc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            background: white;
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            border: 1px solid #eef2f6;
        }

        .code {
            font-size: 5rem;
            font-weight: 700;
            color: #cbd5e1;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            line-height: 1;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.75rem;
        }

        .message {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background 0.2s, transform 0.1s;
            border: none;
            cursor: pointer;
        }

        .home-link:hover {
            background: #1d4ed8;
        }

        .home-link:active {
            transform: scale(0.97);
        }

        /* 极简分隔装饰 */
        .divider {
            width: 48px;
            height: 2px;
            background: #e2e8f0;
            margin: 1rem auto 1.5rem;
            border-radius: 2px;
        }

        /* 辅助提示轻量化 */
        .hint {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 2rem;
            border-top: 1px solid #f1f5f9;
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>资源未找到</h1>
        <div class="divider"></div>
        <div class="message">
            抱歉，您请求的页面或文件不存在。<br>
            请检查链接地址是否正确。
        </div>
        <a href="/" class="home-link" id="homeLink">
            <span>←</span> 返回首页
        </a>
        <div class="hint">
            若您认为这是站点错误，请联系管理员
        </div>
    </div>

    <script>
        // 简单的首页跳转处理（确保点击回到根目录）
        const homeLink = document.getElementById('homeLink');
        if (homeLink) {
            homeLink.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = '/';
            });
        }
        // 可选: 控制台友好提示
        console.log("404: 请求的资源不存在");
    </script>
</body>
</html>
